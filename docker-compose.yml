version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: files_db
      POSTGRES_USER: files_user
      POSTGRES_PASSWORD: files_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: files_db
      POSTGRES_USER: files_user
      POSTGRES_PASSWORD: files_pass
      PORT: 8080
      NODE_ENV: production
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
